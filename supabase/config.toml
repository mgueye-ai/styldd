# Styld app – Supabase project gogpjxxsrcjpbugocvnd
# https://supabase.com/dashboard/project/gogpjxxsrcjpbugocvnd
project_id = "gogpjxxsrcjpbugocvnd"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[auth]
enabled = true
site_url = "http://localhost:8081"
additional_redirect_urls = ["https://styldd.com"]
jwt_expiry = 3600
enable_signup = true

[db]
port = 54322
shadow_port = 54320
major_version = 17

[storage]
enabled = true
file_size_limit = "50MiB"

# Public tenant booking site calls these with the anon key (no logged-in user).
[functions.stripe-booking-pay]
verify_jwt = false

[functions.stripe-booking-confirm]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

[functions.booking-client-email]
verify_jwt = false

[functions.styld-push-notify]
verify_jwt = false

[functions.revenuecat-webhook]
verify_jwt = false
