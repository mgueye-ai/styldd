<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Booking Confirmed</title>
    <link rel="icon" href="assets/favicon-32.png?v=4" type="image/png" sizes="32x32" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png?v=4" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Source+Sans+3:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <script src="js/styld-tenant-config.js"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0e0e1a;
        font-family: 'Source Sans 3', system-ui, -apple-system, sans-serif;
        padding: 32px 20px;
        color: #f0f0ff;
      }

      .card {
        width: 100%;
        max-width: 440px;
        background: #1a1a2e;
        border: 1px solid rgba(252, 97, 163, 0.18);
        border-radius: 20px;
        padding: 48px 36px 40px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      }

      .check-circle {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: rgba(34, 197, 94, 0.12);
        border: 2px solid rgba(34, 197, 94, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
      }

      .check-circle svg {
        width: 36px;
        height: 36px;
        color: #22c55e;
      }

      .title {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 28px;
        font-weight: 700;
        color: #f0f0ff;
        line-height: 1.2;
        margin-bottom: 14px;
      }

      .subtitle {
        font-size: 15px;
        line-height: 1.6;
        color: #8080a0;
        margin-bottom: 32px;
      }

      .subtitle strong {
        color: #c0c0e0;
        font-weight: 600;
      }

      .home-btn {
        display: inline-block;
        padding: 12px 28px;
        background: rgba(252, 97, 163, 0.12);
        border: 1px solid rgba(252, 97, 163, 0.3);
        border-radius: 999px;
        color: #fc61a3;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        transition: background 0.15s, border-color 0.15s;
      }
      .home-btn:hover {
        background: rgba(252, 97, 163, 0.2);
        border-color: rgba(252, 97, 163, 0.5);
      }

      .styld-badge {
        margin-top: 36px;
        font-size: 12px;
        color: #3a3a5a;
        letter-spacing: 0.04em;
      }
      .styld-badge span {
        color: #f0f0ff;
        font-weight: 900;
      }
      .styld-badge span em {
        color: #fc61a3;
        font-style: normal;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="check-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>

      <h1 class="title">Thank you for your booking!</h1>
      <p class="subtitle">
        Your appointment is confirmed.<br />
        <strong>Check your email shortly</strong> — a full confirmation and receipt
        is on its way with everything you need to know.
      </p>

      <a class="home-btn" id="home-link" href="index.html">Back to home</a>

      <p class="styld-badge">
        Booking powered by <span>Styl<em>d</em></span>
      </p>
    </div>

    <script>
      // Update home link to point back to the site root cleanly
      (function () {
        try {
          var cfg = window.TENANT_BOOKING || {};
          if (cfg.subdomain) {
            var a = document.getElementById("home-link");
            if (a) a.href = "index.html";
          }
        } catch (_) {}
      })();
    </script>
  </body>
</html>
