<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Styld Pay — Continue setup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      width: 100%;
      background: #141414;
      border: 1px solid rgba(252, 97, 163, 0.28);
      border-radius: 20px;
      padding: 32px 28px;
      text-align: center;
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
    }
    p {
      color: #a1a1aa;
      font-size: 15px;
      line-height: 1.5;
    }
    .accent { color: #fc61a3; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Continue in the <span class="accent">Styld app</span></h1>
    <p>Your setup link expired. Open <strong>Profile → Connected accounts</strong> in the app and tap <strong>Connect bank</strong> to continue.</p>
  </div>
</body>
</html>
