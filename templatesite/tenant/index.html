<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Loading…</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Great+Vibes&family=Source+Sans+3:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css?v=40" />
    <style>
      #tenant-status {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 2rem;
        background: #fafafa;
        color: #525252;
        font: 600 1rem/1.5 "Source Sans 3", system-ui, sans-serif;
        text-align: center;
        z-index: 9999;
      }
      #tenant-status[hidden] { display: none; }
      body.tenant-error .hero-landing,
      body.tenant-error main,
      body.tenant-error .site-footer { opacity: 0.2; pointer-events: none; }
    </style>
  </head>
  <body class="page-home">
    <div id="tenant-status">Loading your site…</div>

    <section class="hero-landing" aria-label="Welcome">
      <div class="hero-landing__bg" aria-hidden="true"></div>
      <div class="hero-landing__vignette" aria-hidden="true"></div>

      <header class="hero-nav">
        <div class="container hero-nav__inner">
          <a class="hero-brand" href="#">
            <img class="hero-brand__logo" src="/assets/placeholders/logo.svg" width="44" height="44" alt="" />
            <span class="hero-brand__text" id="preview-brand">Your brand name</span>
          </a>

          <button
            type="button"
            class="hero-nav__burger"
            id="hero-nav-toggle"
            aria-expanded="false"
            aria-controls="hero-nav-panel"
          >
            <span class="hero-nav__burger-box" aria-hidden="true">
              <span class="hero-nav__burger-line"></span>
              <span class="hero-nav__burger-line"></span>
              <span class="hero-nav__burger-line"></span>
            </span>
            <span class="visually-hidden">Menu</span>
          </button>

          <div id="hero-nav-panel" class="hero-nav__panel">
            <nav class="hero-nav__links" aria-label="Main">
              <a href="/">Home</a>
            </nav>
            <div class="hero-nav__actions">
              <a class="hero-btn hero-btn--nav" href="/booking">Book Now</a>
            </div>
          </div>
        </div>
      </header>

      <div class="container hero-landing__content">
        <div id="preview-hero-inner">
          <div class="hero-scale-layout hero-layout--split">
            <h1 class="hero-scale-title">
              <span class="hero-scale-title__grid">
                <span class="hero-scale-col hero-scale-col--left">
                  <span class="hero-scale-kicker" id="preview-kicker">Your brand name</span>
                  <span class="hero-scale-display hero-scale-display--ink" id="preview-tagline-left">Put your</span>
                </span>
                <span class="hero-scale-visual">
                  <img class="hero-scale-visual__img" src="/assets/placeholders/hero.svg" alt="" width="560" height="840" decoding="async" />
                </span>
                <span class="hero-scale-col hero-scale-col--right">
                  <span class="hero-scale-display hero-scale-display--brand">
                    <span class="hero-scale-display__line" id="preview-tagline-right-1">style</span>
                    <span class="hero-scale-display__line" id="preview-tagline-right-2">here</span>
                  </span>
                </span>
              </span>
            </h1>
            <div class="hero-ctas hero-ctas--landing hero-ctas--scale">
              <a class="hero-btn hero-btn--outline-light hero-btn--lg" href="#preview-menu-section">Browse menu &amp; prices</a>
              <a class="hero-btn hero-btn--gold hero-btn--lg" href="/booking">Book now</a>
            </div>
          </div>
        </div>
      </div>
    </section>

    <main>
      <section class="section section-popular-styles" id="preview-menu-section" data-site-section="menu">
        <div class="container">
          <div class="section-head section-head--popular">
            <h2 id="preview-menu-title">Menu</h2>
            <p id="preview-menu-blurb">Browse our services &amp; prices — book online.</p>
          </div>
          <div id="preview-style-grid"></div>
        </div>
      </section>

      <section class="section" data-site-section="about">
        <div class="container">
          <div class="section-head">
            <h2 id="preview-about-title">About</h2>
            <p id="preview-about-body"></p>
          </div>
        </div>
      </section>

      <section class="section section-alt" id="preview-visit-section" data-site-section="visit">
        <div class="container">
          <div class="section-head">
            <h2 id="preview-visit-title">Visit &amp; connect</h2>
            <p id="preview-visit-body"></p>
          </div>
          <div class="info-cards info-cards--location-layout">
            <article class="info-card info-card--location">
              <h3>Location</h3>
              <div class="info-card-body">
                <div data-location-part="address"></div>
                <div data-location-part="contact">
                  <p id="preview-phone"></p>
                  <p id="preview-instagram"></p>
                </div>
              </div>
              <div class="location-map-wrap" data-location-part="map">
                <iframe id="preview-map" class="location-map" title="Map" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
              </div>
            </article>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer site-footer--home-promo">
      <div class="container footer-bottom">
        <p id="preview-footer-brand">&copy; Your brand name</p>
        <p class="footer-built-by">
          <a
            class="footer-built-by__link"
            id="preview-footer-styld-link"
            href="https://styldd.com"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img
              class="footer-built-by__logo"
              src="/assets/styld-icon.png"
              alt=""
              width="22"
              height="22"
              decoding="async"
            />
            <span>Built with Styld</span>
          </a>
        </p>
      </div>
    </footer>

    <script src="/js/styld-tenant-config.js?v=35"></script>
    <script src="/js/styld-tenant-config.local.js?v=35"></script>
    <script src="/js/styld-tenant-shared.js?v=39"></script>
    <script src="/js/preview-content.js?v=40"></script>
    <script src="/js/tenant-site.js?v=35"></script>
    <script src="/js/hero-nav.js" defer></script>
  </body>
</html>
