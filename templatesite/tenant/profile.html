<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Loading…</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700&family=Inter:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Source+Sans+3:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css?v=42" />
    <style>
      #tenant-status {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 2rem;
        background: #fafafa;
        color: #525252;
        font: 600 1rem/1.5 "Source Sans 3", system-ui, sans-serif;
        text-align: center;
        z-index: 9999;
      }
      #tenant-status[hidden] { display: none; }
      body.tenant-error .profile-nav,
      body.tenant-error .profile-hero,
      body.tenant-error .profile-menu-section,
      body.tenant-error .profile-location-section,
      body.tenant-error .site-footer { opacity: 0.2; pointer-events: none; }
    </style>
  </head>
  <body class="tpl-profile page-home">
    <div id="tenant-status">Loading your site…</div>

    <!-- Nav -->
    <nav class="profile-nav" id="profile-nav">
      <div class="container profile-nav__inner">
        <a class="profile-brand" href="./">
          <div class="profile-brand__logo" id="profile-logo-placeholder" aria-hidden="true"></div>
          <span id="profile-brand-name">Your Brand</span>
        </a>
        <a class="profile-book-btn" href="/booking">Book Now</a>
      </div>
    </nav>

    <!-- Hero: Photo + About/Policies -->
    <section class="profile-hero">
      <div class="container profile-hero__grid">
        <div class="profile-photo" id="profile-photo-wrap">
          <div class="profile-photo__bg" id="profile-hero-photo"></div>
        </div>
        <div class="profile-info">
          <div class="profile-section-block">
            <h2 class="profile-about-head" id="profile-about-title">About Me</h2>
            <p class="profile-about-body" id="profile-about-body"></p>
          </div>
          <div class="profile-section-block" id="profile-policy-block">
            <h3 class="profile-policy-head">Policies</h3>
            <p class="profile-policy-body" id="profile-policy-body"></p>
          </div>
        </div>
      </div>
    </section>

    <main>
      <!-- Menu -->
      <section class="profile-menu-section" id="profile-menu-section" data-site-section="menu">
        <div class="container">
          <div class="profile-menu-head">
            <h2 id="profile-menu-title">Menu</h2>
            <p class="profile-menu-blurb" id="profile-menu-blurb"></p>
          </div>
          <div id="profile-service-grid" class="profile-service-grid">
            <!-- populated by profile-content.js -->
          </div>
        </div>
      </section>

      <!-- Location -->
      <section class="profile-location-section" id="profile-location-section" data-site-section="visit">
        <div class="container">
          <div class="profile-location-head">
            <h2 id="profile-visit-title">Location</h2>
          </div>
          <div class="profile-location-card">
            <div class="profile-location-info" id="profile-location-info">
              <!-- populated by profile-content.js -->
            </div>
            <iframe
              class="profile-location-map"
              id="profile-map"
              title="Location map"
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
            ></iframe>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="site-footer site-footer--home-promo">
      <div class="container footer-bottom">
        <p id="preview-footer-brand">&copy; Your brand name</p>
        <p class="footer-built-by">
          <a
            class="footer-built-by__link"
            id="preview-footer-styld-link"
            href="https://styldd.com"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img
              class="footer-built-by__logo"
              src="/assets/styld-icon.png"
              alt=""
              width="22"
              height="22"
              decoding="async"
            />
            <span>Built with Styld</span>
          </a>
        </p>
      </div>
    </footer>

    <script src="/js/styld-tenant-config.js?v=35"></script>
    <script src="/js/styld-tenant-config.local.js?v=35"></script>
    <script src="/js/styld-tenant-shared.js?v=39"></script>
    <script src="/js/styld-analytics.js?v=1"></script>
    <script src="/js/profile-content.js?v=2"></script>
    <script src="/js/tenant-site.js?v=37"></script>
  </body>
</html>
